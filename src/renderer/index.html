<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss: http:; img-src 'self' data:"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grove — Multi-Agent Claude Orchestrator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Grove</div>
      <div class="brand-sub">multi-agent Claude orchestrator</div>
      <div id="usage" class="usage" title="Klik untuk detail limit"></div>
      <button id="usage-refresh" class="usage-refresh" title="Refresh pemakaian sekarang (auto tiap 5 menit)">↻</button>
      <div id="usage-panel" class="usage-panel"><div id="usage-limits"></div><div id="usage-history"></div></div>
      <div class="legend">
        <span class="dot s-running"></span>running
        <span class="dot s-idle"></span>idle
        <span class="dot s-done"></span>done
        <span class="dot s-error"></span>error
        <span class="dot s-await await-legend"></span>butuh jawaban
      </div>
      <select id="global-model" class="model-sel" title="Model default untuk semua sesi (bisa ditimpa per-sesi)"></select>
      <select
        id="global-effort"
        class="model-sel"
        title="Tingkat mikir default untuk semua sesi (bisa ditimpa per-sesi). low→max = kedalaman penalaran; off = tanpa extended thinking (efektif di Claude; DeepSeek tetap mikir)."
      ></select>
      <button id="btn-accounts" class="acct-btn" title="Kelola akun Claude (login via setup-token) & switch per-sesi">⚙ Akun</button>
      <div id="acct-panel" class="acct-panel"></div>
      <button id="btn-tools" class="acct-btn" title="Utilitas: diff checker berwarna & formatter JSON/YAML">🛠 Tools</button>
      <div id="tools-panel" class="tools-panel"></div>
      <button id="btn-stop-all" class="stop-all-btn" title="Hentikan turn semua sesi yang sedang berjalan">■ Stop All</button>
    </header>
    <!-- Banner "belum ada akun". Grove berjalan murni dgn token akun GUI; tanpa itu sesi tak bisa
         start, tapi APP TETAP JALAN — banner ini yang memberi tahu, bukan crash/diam-diam. -->
    <div id="auth-banner" class="auth-banner" hidden></div>

    <main class="layout">
      <aside class="panel sidebar">
        <div class="panel-head sidebar-head">
          <span>SESSIONS</span>
          <div class="head-actions">
            <button id="btn-new-chat" class="mini-btn primary" title="Mulai chat tanpa folder (tanya-tanya)">+ Chat</button>
            <button id="btn-open-folder" class="mini-btn" title="Buka folder proyek">+ Folder</button>
          </div>
        </div>
        <div id="tree" class="tree"></div>
      </aside>

      <div class="col-resizer" id="resize-left" title="Geser untuk atur lebar sidebar (dobel-klik: reset)"></div>

      <section class="panel chat" id="chat">
        <div class="panel-head" id="chat-head">
          <span id="chat-title">Belum ada session</span>
          <span id="chat-badge" class="badge"></span>
          <span id="chat-telem" class="telem"></span>
          <select id="chat-model" class="model-sel" title="Model sesi ini (kosong = ikut sesi utama / global)"></select>
          <select
            id="chat-effort"
            class="model-sel"
            title="Tingkat mikir (reasoning) sesi ini. low→max mengatur kedalaman penalaran (berlaku untuk Claude & DeepSeek). off = tanpa extended thinking — efektif di Claude; DeepSeek tetap menghasilkan thinking karena default servernya nyala. Kosong = ikut sesi utama / global. Berlaku di giliran berikutnya."
          ></select>
          <button id="btn-lite" class="lite-btn" title="Mode: Chat ringan (hemat token, tanpa orkestrasi) vs Orkestrator (bisa spawn worker). Klik untuk ganti — berlaku di pesan berikutnya.">⚡ Chat</button>
          <button id="btn-loop" class="loop-btn" title="Auto-check berkala 10 menit: kirim &quot;udah sampe mana?&quot; ke UTAMA biar worker terus jalan (klik untuk on/off)">🔁 Auto</button>
          <button id="btn-compact" class="compact-btn" title="Ringkas laporan sub/sub-sub → simpan ke Memori & padatkan konteks (hanya UTAMA)">🗜 Compact</button>
          <button id="btn-stop" class="stop-btn" title="Interupsi turn yang sedang berjalan">⏹ Stop</button>
        </div>
        <div class="chat-log-wrap">
          <div id="chat-log" class="chat-log"></div>
          <!-- Muncul hanya saat kamu menggulir ke atas: auto-scroll berhenti supaya bisa membaca,
               tombol ini yang membawamu kembali ke pesan terbaru (dan menyalakannya lagi). -->
          <button id="chat-jump" class="chat-jump" hidden title="Ke pesan terbaru (auto-scroll menyala lagi)">
            ↓ pesan terbaru
          </button>
        </div>
        <div class="composer">
          <!-- Pesan yang masih ANTRI (ditahan Grove selama turn jalan): bisa diedit / dibatalkan. -->
          <div id="chat-queue" class="chat-queue"></div>
          <div id="chat-attach" class="chat-attach"></div>
          <form id="chat-form" class="chat-form">
            <textarea
              id="chat-input"
              rows="1"
              placeholder="Ketik pesan…  (Enter kirim · ↑ riwayat prompt · Shift+Enter baris baru · /btw tanya di samping)"
            ></textarea>
            <button id="chat-send" type="submit">Kirim</button>
          </form>
        </div>
        <!-- Panel REQUEST: teks MENTAH yang Grove kirim ke query() tiap giliran (termasuk auto-task &
             recycle yang tak direkam ke chat). Isi chat TIDAK diduplikasi di sini — respons, tool,
             dan metrik per-call semuanya tampil di chat. Tertutup secara default. -->
        <div class="logpanel" id="logpanel">
          <div
            class="logpanel-head"
            id="log-head"
            title="Teks mentah yang Grove kirim ke model tiap giliran (prompt + reseed + auto-task) — klik untuk buka/tutup"
          >
            <span class="log-caret" id="log-caret">▸</span>
            <span>REQUEST MENTAH</span>
            <span class="log-hint" id="log-hint">belum ada</span>
          </div>
          <!-- Proses CLI yang hidup + pemetaannya ke sesi (pid & RAM) — menjawab "worker mana yang
               memakan RAM / proses mana yang harus dimatikan" tanpa membuka Task Manager. -->
          <div class="log-procs" id="log-procs" title="Proses CLI milik Grove. Pemetaan ke sesi berdasarkan waktu mulai query (best-effort)."></div>
          <div class="log-tree" id="log-tree"></div>
        </div>
      </section>

      <div class="col-resizer" id="resize-right" title="Geser untuk atur lebar papan (dobel-klik: reset)"></div>

      <aside class="panel board">
        <div class="panel-head">PAPAN TULIS</div>
        <div id="board" class="board-list"></div>
        <div class="panel-head">PESAN</div>
        <div id="inbox" class="inbox"></div>
        <div class="panel-head">MEMORI</div>
        <div id="memories" class="mem-list"></div>
      </aside>
    </main>

    <div id="drop-overlay" class="drop-overlay">
      <!-- Teks diganti saat runtime mengikuti ZONA yang di-hover (lihat applyZone di main.ts). -->
      <div class="drop-inner" id="drop-hint">📎 Lepas file/folder → jadi referensi chat ini · gambar → lampiran</div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
